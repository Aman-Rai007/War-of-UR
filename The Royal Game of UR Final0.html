<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Royal Game of Ur - Rai !nformatics</title>
    
    <link rel="icon" type="image/png" href="logo.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Marcellus&display=swap');

        :root {
            --gold: #e5b83b;
            --blue: #225187;
            --bg-color: #0b1118;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Marcellus', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Fixes overlap by stacking properly */
            margin: 0;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            padding-top: 15px;
            box-sizing: border-box;
        }

        /* --- RAI !NFORMATICS SPLASH SCREEN --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #050505; z-index: 9999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1s ease-out; 
        }

        .splash-title {
            font-size: 3.5rem; color: var(--gold); margin: 0;
            letter-spacing: 3px; text-transform: uppercase;
            animation: pulseGlow 2s infinite alternate;
            font-family: 'Cinzel', serif;
            text-align: center;
        }

        .splash-subtitle { font-size: 1.2rem; color: #888; margin-top: 10px; letter-spacing: 2px; }

        @keyframes pulseGlow {
            from { text-shadow: 0 0 10px rgba(255, 204, 51, 0.2); transform: scale(1); }
            to { text-shadow: 0 0 30px rgba(255, 204, 51, 0.8); transform: scale(1.05); }
        }

        /* --- HTML UI ELEMENTS --- */
        header { text-align: center; width: 100%; z-index: 10; margin-bottom: 15px; }
        h1 { font-family: 'Cinzel', serif; margin: 0; font-size: 1.6rem; color: var(--gold); text-shadow: 0 2px 10px rgba(0,0,0,0.8); letter-spacing: 2px; }
        h3 { margin: 4px 0 0 0; font-size: 0.8rem; color: #aaa; letter-spacing: 1px; }

        #ui-overlay { display: flex; gap: 15px; z-index: 10; margin-bottom: 10px; }

        .btn {
            background: linear-gradient(to bottom, #4a4a4a, #2a2a2a);
            border: 2px solid var(--gold); border-radius: 20px; color: var(--gold);
            font-family: 'Cinzel', serif; padding: 10px 18px; font-size: 0.95rem;
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: all 0.2s;
        }
        .btn.active { background: linear-gradient(to bottom, var(--gold), #b8860b); color: #000; border-color: #fff; box-shadow: 0 0 15px rgba(229, 184, 59, 0.6);}
        .btn:active { transform: scale(0.95); }

        /* --- CANVAS CONTAINER --- */
        #game-container {
            position: relative; width: 100%; max-width: 600px;
            flex: 1; /* Takes up remaining height perfectly */
            min-height: 0;
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 10px;
        }

        canvas {
            width: 100%; height: 100%; object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.8));
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <h1 class="splash-title">Rai !nformatics</h1>
        <div class="splash-subtitle">PRESENTS</div>
        <div class="splash-subtitle" style="margin-top: 30px; font-size: 0.9rem;">Founder: Aman Rai</div>
    </div>

    <header>
        <h1>THE ROYAL GAME OF UR</h1>
        <h3>Rai !nformatics &copy; 2026 | Founder: Aman Rai</h3>
    </header>

    <div id="ui-overlay">
        <button class="btn active" id="btn-pvp" onclick="setMode('PvP')">Player vs Player</button>
        <button class="btn" id="btn-pve" onclick="setMode('PvE')">Player vs AI</button>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="600" height="900"></canvas>
    </div>

<script>
window.addEventListener('load', () => {
    const splash = document.getElementById('splash-screen');
    setTimeout(() => {
        splash.style.opacity = '0';
        setTimeout(() => splash.style.display = 'none', 1000);
    }, 2000);
});

/**
 * AUDIO ENGINE
 */
let audioCtx;
function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;

    if (type === 'roll') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
        gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
    } else if (type === 'move') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, now);
        gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
        osc.start(now); osc.stop(now + 0.15);
    } else if (type === 'capture') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.linearRampToValueAtTime(50, now + 0.2);
        gain.gain.setValueAtTime(0.3, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
    } else if (type === 'select') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, now);
        gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
        osc.start(now); osc.stop(now + 0.05);
    }
}

/**
 * CORE GAME SETUP & CANVAS MATH
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const TILE = 75;
const OFF_X = (600 - (TILE * 3)) / 2; // 187.5
const OFF_Y = 160; // Pushed down to avoid overlap with canvas text

const P1_PATH = [[0,3], [0,2], [0,1], [0,0], [1,0], [1,1], [1,2], [1,3], [1,4], [1,5], [1,6], [1,7], [0,7], [0,6]];
const P2_PATH = [[2,3], [2,2], [2,1], [2,0], [1,0], [1,1], [1,2], [1,3], [1,4], [1,5], [1,6], [1,7], [2,7], [2,6]];
const ROSETTES = ["0,0", "2,0", "1,3", "0,6", "2,6"];

let state = {
    mode: 'PvP', turn: 1, roll: 0, hasRolled: false, isRolling: false, selectedPiece: -1,
    diceResults: [0,0,0,0], p1_pos: Array(7).fill(-1), p2_pos: Array(7).fill(-1),
    p1_score: 0, p2_score: 0,
    statusText: "PLAYER 1", subText: "TAP DICE TO ROLL"
};

let visualPieces = {
    p1: Array.from({length: 7}, (_, i) => ({ x: 60, y: 320 + i*28, tx: 60, ty: 320 + i*28 })),
    p2: Array.from({length: 7}, (_, i) => ({ x: 540, y: 320 + i*28, tx: 540, ty: 320 + i*28 }))
};

function setMode(mode) {
    initAudio();
    state.mode = mode;
    document.getElementById('btn-pvp').className = mode === 'PvP' ? 'btn active' : 'btn';
    document.getElementById('btn-pve').className = mode === 'PvE' ? 'btn active' : 'btn';
    resetGame();
}

function resetGame() {
    state.turn = 1; state.roll = 0; state.hasRolled = false; state.isRolling = false; state.selectedPiece = -1;
    state.p1_pos.fill(-1); state.p2_pos.fill(-1); state.p1_score = 0; state.p2_score = 0;
    state.statusText = "PLAYER 1"; state.subText = "TAP DICE TO ROLL";
    updateTargetCoords();
}

/**
 * PROCEDURAL GRAPHICS RENDERING
 */
function drawWoodBackground() {
    // Deep blue/black table background
    let bgGrad = ctx.createRadialGradient(300, 450, 100, 300, 450, 600);
    bgGrad.addColorStop(0, "#121a24");
    bgGrad.addColorStop(1, "#030508");
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, 600, 900);
    
    // Vertical wood planks
    ctx.lineWidth = 1;
    for(let i=0; i<600; i+=35) {
        ctx.fillStyle = i%70===0 ? "rgba(255,255,255,0.015)" : "rgba(0,0,0,0.2)";
        ctx.fillRect(i, 0, 35, 900);
        ctx.strokeStyle = "rgba(0,0,0,0.5)";
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 900); ctx.stroke();
    }
}

// Helper to trace the exact shape of the board
function traceBoard(inset) {
    ctx.beginPath();
    ctx.moveTo(OFF_X - inset, OFF_Y - inset);
    ctx.lineTo(OFF_X + TILE*3 + inset, OFF_Y - inset);
    ctx.lineTo(OFF_X + TILE*3 + inset, OFF_Y + TILE*4 + inset);
    ctx.lineTo(OFF_X + TILE*2 + inset, OFF_Y + TILE*4 + inset);
    ctx.lineTo(OFF_X + TILE*2 + inset, OFF_Y + TILE*6 - inset);
    ctx.lineTo(OFF_X + TILE*3 + inset, OFF_Y + TILE*6 - inset);
    ctx.lineTo(OFF_X + TILE*3 + inset, OFF_Y + TILE*8 + inset);
    ctx.lineTo(OFF_X - inset, OFF_Y + TILE*8 + inset);
    ctx.lineTo(OFF_X - inset, OFF_Y + TILE*6 - inset);
    ctx.lineTo(OFF_X + TILE - inset, OFF_Y + TILE*6 - inset);
    ctx.lineTo(OFF_X + TILE - inset, OFF_Y + TILE*4 + inset);
    ctx.lineTo(OFF_X - inset, OFF_Y + TILE*4 + inset);
    ctx.closePath();
}

function drawBoardBase() {
    // 1. Drop Shadow
    ctx.shadowBlur = 20; ctx.shadowColor = "rgba(0,0,0,0.9)";
    ctx.fillStyle = "#000"; traceBoard(-12); ctx.fill();
    ctx.shadowBlur = 0;

    // 2. Outer Red/Gold Decorative Border (Premium Upgrade)
    ctx.fillStyle = "#8b251d"; // Deep Red
    traceBoard(-12); ctx.fill();
    
    ctx.strokeStyle = "#e5b83b"; // Gold Trim
    ctx.lineWidth = 4;
    traceBoard(-12); ctx.stroke();
    
    // Draw white/gold dashed pattern on the border
    ctx.strokeStyle = "#f4f4f4";
    ctx.lineWidth = 4;
    ctx.setLineDash([8, 12]);
    traceBoard(-8); ctx.stroke();
    ctx.setLineDash([]);

    // 3. Inner Wood Base
    ctx.fillStyle = "#4a2a16"; // Dark Mahogany
    traceBoard(0); ctx.fill();
    ctx.strokeStyle = "#1a0f08";
    ctx.lineWidth = 6;
    traceBoard(0); ctx.stroke();
}

function drawTile(c, r) {
    if((c===0||c===2) && (r===4||r===5)) return; 
    let x = OFF_X + c*TILE, y = OFF_Y + r*TILE;
    let isRosette = ROSETTES.includes(`${c},${r}`);

    // Rich Wood Tile Gradient
    let grad = ctx.createLinearGradient(x, y, x+TILE, y+TILE);
    grad.addColorStop(0, "#d19a58");
    grad.addColorStop(1, "#8c5622");
    ctx.fillStyle = grad;
    ctx.fillRect(x+2, y+2, TILE-4, TILE-4);

    // Inner shadow/bevel for tiles
    ctx.strokeStyle = "rgba(0,0,0,0.5)";
    ctx.lineWidth = 3;
    ctx.strokeRect(x+2, y+2, TILE-4, TILE-4);
    ctx.strokeStyle = "rgba(255,255,255,0.1)";
    ctx.lineWidth = 1;
    ctx.strokeRect(x+4, y+4, TILE-8, TILE-8);

    if (isRosette) {
        ctx.save();
        ctx.translate(x + TILE/2, y + TILE/2);
        // Premium 8-petal Rosette
        for(let i=0; i<8; i++) {
            ctx.rotate(Math.PI / 4);
            ctx.beginPath();
            ctx.moveTo(0,0);
            ctx.quadraticCurveTo(15, -15, 25, 0);
            ctx.quadraticCurveTo(15, 15, 0, 0);
            // Red and Cyan petals like the original
            ctx.fillStyle = i%2===0 ? "#b03a3a" : "#2d8fa8"; 
            ctx.fill();
            ctx.strokeStyle = "#e5b83b"; 
            ctx.lineWidth = 2;
            ctx.stroke();
        }
        ctx.beginPath(); ctx.arc(0,0,6,0,Math.PI*2); 
        ctx.fillStyle = "#e5b83b"; ctx.fill();
        ctx.restore();
    } else {
        // Ancient 5-dot indentations
        ctx.fillStyle = "rgba(45, 143, 168, 0.7)"; // Cyan inset
        ctx.strokeStyle = "#e5b83b"; // Gold ring
        ctx.lineWidth = 1.5;
        let p = [ [18,18], [TILE-18,18], [TILE/2,TILE/2], [18,TILE-18], [TILE-18,TILE-18] ];
        p.forEach(pt => {
            ctx.beginPath(); ctx.arc(x+pt[0], y+pt[1], 4.5, 0, Math.PI*2);
            ctx.fill(); ctx.stroke();
        });
    }
}

function drawPyramidDie(x, y, value, isRolling) {
    ctx.save();
    ctx.translate(x, y);
    
    if(isRolling) {
        ctx.rotate((Math.random()-0.5) * 0.5);
        ctx.translate((Math.random()-0.5)*5, (Math.random()-0.5)*5);
    }

    // Shadow
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.beginPath(); ctx.moveTo(0, -8); ctx.lineTo(-25, 20); ctx.lineTo(15, 25); ctx.fill();

    // Left Face (Dark Stone)
    ctx.beginPath(); ctx.moveTo(0, -28); ctx.lineTo(-22, 16); ctx.lineTo(0, 24); ctx.closePath();
    ctx.fillStyle = "#4a3c31"; ctx.fill();
    ctx.strokeStyle = "#1a1511"; ctx.lineWidth = 2; ctx.stroke();

    // Right Face (Light Stone)
    ctx.beginPath(); ctx.moveTo(0, -28); ctx.lineTo(22, 16); ctx.lineTo(0, 24); ctx.closePath();
    ctx.fillStyle = "#7a6655"; ctx.fill();
    ctx.stroke();

    // White/Gold Tip
    if(value === 1) {
        ctx.beginPath(); ctx.moveTo(0, -28); ctx.lineTo(-11, -6); ctx.lineTo(0, -3); ctx.closePath();
        ctx.fillStyle = "#f4f4f4"; ctx.fill();
        ctx.beginPath(); ctx.moveTo(0, -28); ctx.lineTo(11, -6); ctx.lineTo(0, -3); ctx.closePath();
        ctx.fillStyle = "#dcdcdc"; ctx.fill();
    }
    ctx.restore();
}

function getCoordsForPos(player, posIdx) {
    if(posIdx < 0) return { x: player===1 ? 60 : 540, y: 500 }; 
    if(posIdx >= 14) return { x: player===1 ? 60 : 540, y: 850 }; 
    let path = player === 1 ? P1_PATH : P2_PATH;
    let [c, r] = path[posIdx];
    return { x: OFF_X + c*TILE + TILE/2, y: OFF_Y + r*TILE + TILE/2 };
}

function drawSelectedPath() {
    if (state.selectedPiece === -1) return;
    let logicPos = state.turn === 1 ? state.p1_pos[state.selectedPiece] : state.p2_pos[state.selectedPiece];
    let targetPos = logicPos + state.roll;
    if (targetPos > 14) return;

    let glowColor = state.turn === 1 ? "#00d2ff" : "#ff3e3e";

    ctx.save();
    ctx.beginPath();
    let startCoords = getCoordsForPos(state.turn, logicPos);
    ctx.moveTo(startCoords.x, startCoords.y);

    let startIdx = Math.max(0, logicPos); 
    let endIdx = Math.min(13, targetPos);
    for (let i = startIdx; i <= endIdx; i++) {
        let pCoords = getCoordsForPos(state.turn, i);
        ctx.lineTo(pCoords.x, pCoords.y);
    }
    if (targetPos === 14) {
        let exitCoords = getCoordsForPos(state.turn, 14);
        ctx.lineTo(exitCoords.x, exitCoords.y);
    }

    ctx.strokeStyle = glowColor;
    ctx.lineWidth = 5; ctx.lineCap = "round"; ctx.lineJoin = "round";
    ctx.setLineDash([15, 10]);
    ctx.lineDashOffset = -(performance.now() / 30);
    ctx.shadowBlur = 15; ctx.shadowColor = glowColor;
    ctx.stroke();

    if (targetPos < 14) {
        let targetCoords = getCoordsForPos(state.turn, targetPos);
        ctx.fillStyle = glowColor;
        ctx.globalAlpha = 0.3 + Math.sin(performance.now() / 150) * 0.1; 
        ctx.fillRect(targetCoords.x - TILE/2 + 4, targetCoords.y - TILE/2 + 4, TILE-8, TILE-8);
        ctx.globalAlpha = 1.0;
    }
    ctx.restore();
}

function drawUI() {
    ctx.textAlign = "center";
    
    // Status Text - FIXED Y COORDINATES SO IT DOESN'T OVERLAP HTML
    ctx.font = "bold 32px Cinzel";
    ctx.fillStyle = state.turn === 1 ? "#4a90e2" : "#e8a858";
    ctx.shadowBlur = 15; ctx.shadowColor = ctx.fillStyle;
    ctx.fillText(state.statusText, 300, 70);
    ctx.shadowBlur = 0;
    
    ctx.font = "16px Marcellus";
    ctx.fillStyle = "#aaaaaa";
    ctx.fillText(state.subText, 300, 95);

    // Side UI
    ctx.fillStyle = "#fff";
    ctx.font = "bold 18px Cinzel"; ctx.fillText("DARK", 60, 240);
    ctx.font = "12px Marcellus"; ctx.fillText("PIECES", 60, 255);
    ctx.font = "bold 18px Cinzel"; ctx.fillText("SCORE", 60, 680);
    ctx.font = "28px Marcellus"; ctx.fillText(state.p1_score, 60, 715);

    ctx.font = "bold 18px Cinzel"; ctx.fillText("LIGHT", 540, 240);
    ctx.font = "12px Marcellus"; ctx.fillText("PIECES", 540, 255);
    ctx.font = "bold 18px Cinzel"; ctx.fillText("SCORE", 540, 680);
    ctx.font = "28px Marcellus"; ctx.fillText(state.p2_score, 540, 715);

    // Dice Area
    ctx.fillStyle = "#fff";
    ctx.font = "bold 26px Cinzel";
    if(!state.hasRolled && state.mode !== 'PvE' || (!state.hasRolled && state.turn === 1)) {
        ctx.shadowBlur = 15; ctx.shadowColor = "rgba(255, 204, 51, 0.5)";
    }
    ctx.fillText("◀ ROLL ▶", 300, 810);
    ctx.shadowBlur = 0;

    for(let i=0; i<4; i++) {
        drawPyramidDie(210 + i*60, 860, state.diceResults[i], state.isRolling);
    }
}

/**
 * INTERACTION LOGIC
 */
function getCanvasCoords(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    let cx = e.clientX, cy = e.clientY;
    if(e.touches && e.touches.length > 0) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
    return { x: (cx - rect.left) * scaleX, y: (cy - rect.top) * scaleY };
}

canvas.addEventListener('mousedown', handleClick);
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleClick(e); }, {passive: false});

function handleClick(e) {
    initAudio();
    const { x, y } = getCanvasCoords(e);

    // Clicked Dice Area?
    if (y > 770 && y < 900 && x > 150 && x < 450) {
        if(!state.hasRolled && !state.isRolling && !(state.mode === 'PvE' && state.turn === 2)) {
            triggerRoll();
        }
        return;
    }

    if(!state.hasRolled || state.roll === 0 || state.isRolling) return;
    if(state.mode === 'PvE' && state.turn === 2) return; 

    let vPieces = state.turn === 1 ? visualPieces.p1 : visualPieces.p2;
    let logicalArray = state.turn === 1 ? state.p1_pos : state.p2_pos;

    // Confirm Move?
    if (state.selectedPiece !== -1) {
        let currentPos = logicalArray[state.selectedPiece];
        let targetPos = currentPos + state.roll;
        
        if (targetPos <= 14) {
            let targetCoords = getCoordsForPos(state.turn, targetPos);
            if (Math.hypot(x - targetCoords.x, y - targetCoords.y) < 40) {
                attemptMove(state.turn, state.selectedPiece);
                return;
            }
        }
        if (Math.hypot(x - vPieces[state.selectedPiece].x, y - vPieces[state.selectedPiece].y) < 35) {
            attemptMove(state.turn, state.selectedPiece);
            return;
        }
    }

    // Select Piece?
    for(let i=0; i<7; i++) {
        if(logicalArray[i] >= 14) continue;
        if(Math.hypot(x - vPieces[i].x, y - vPieces[i].y) < 35) {
            if(isValidMove(state.turn, i)) {
                state.selectedPiece = i;
                playSound('select');
                state.subText = "TAP PATH TARGET TO CONFIRM";
                return;
            }
        }
    }

    state.selectedPiece = -1;
    state.subText = "TAP A GLOWING PIECE TO SELECT";
}

function performRoll() {
    initAudio(); 
    if(state.hasRolled) return;
    playSound('roll');
    state.isRolling = true; state.selectedPiece = -1;
    state.statusText = "ROLLING..."; state.subText = "";
    
    setTimeout(() => {
        state.isRolling = false; state.roll = 0; state.diceResults = [];
        for(let i=0; i<4; i++) {
            let val = Math.random() > 0.5 ? 1 : 0;
            state.diceResults.push(val); state.roll += val;
        }
        state.hasRolled = true;

        if(state.roll === 0) {
            state.statusText = "ROLLED 0"; state.subText = "NO MOVES POSSIBLE";
            setTimeout(switchTurn, 1500);
        } else {
            let hasMove = false;
            for(let i=0; i<7; i++) if(isValidMove(state.turn, i)) hasMove = true;
            
            if(!hasMove) {
                state.statusText = `ROLLED ${state.roll}`; state.subText = "ALL PIECES BLOCKED";
                setTimeout(switchTurn, 2000);
            } else {
                state.statusText = `ROLLED ${state.roll}`;
                if (state.mode === 'PvE' && state.turn === 2) {
                    state.subText = "AI IS THINKING...";
                    setTimeout(executeAI, 1000);
                } else {
                    state.subText = "TAP A GLOWING PIECE TO SELECT";
                }
            }
        }
    }, 600);
}
function triggerRoll() { performRoll(); }

function isValidMove(player, pieceIdx) {
    let pieces = player === 1 ? state.p1_pos : state.p2_pos;
    let other = player === 1 ? state.p2_pos : state.p1_pos;
    let next = pieces[pieceIdx] + state.roll;

    if(next > 14) return false;
    if(next === 14) return true; 
    if(pieces.includes(next)) return false; 
    if(next >= 4 && next <= 11 && next === 7 && other.includes(7)) return false; 
    return true;
}

function attemptMove(player, idx) {
    state.selectedPiece = -1; 
    let pieces = player === 1 ? state.p1_pos : state.p2_pos;
    let other = player === 1 ? state.p2_pos : state.p1_pos;
    let next = pieces[idx] + state.roll;

    if(next >= 4 && next <= 11 && next !== 7) {
        let target = other.indexOf(next);
        if(target !== -1) { other[target] = -1; playSound('capture'); }
    }

    pieces[idx] = next;
    updateTargetCoords();
    playSound('move');

    if(next === 14) {
        if(player === 1) state.p1_score++; else state.p2_score++;
    }

    if(state.p1_score === 7 || state.p2_score === 7) {
        state.statusText = `🏆 PLAYER ${player} WINS!`; state.subText = "GAME OVER";
        setTimeout(resetGame, 5000); return;
    }

    if(next === 3 || next === 7 || next === 13) {
        state.hasRolled = false;
        state.statusText = "✦ EXTRA TURN ✦"; state.subText = "TAP DICE TO ROLL AGAIN";
        if(state.mode === 'PvE' && player === 2) setTimeout(triggerRoll, 1500);
    } else {
        setTimeout(switchTurn, 600);
    }
}

function switchTurn() {
    state.turn = state.turn === 1 ? 2 : 1;
    state.hasRolled = false; state.diceResults = [0,0,0,0]; state.selectedPiece = -1;
    if(state.mode === 'PvE' && state.turn === 2) {
        state.statusText = "AI TURN"; state.subText = "AI IS ROLLING...";
        setTimeout(triggerRoll, 1000);
    } else {
        state.statusText = `PLAYER ${state.turn} TURN`; state.subText = "TAP DICE TO ROLL";
    }
}

function executeAI() {
    let validMoves = [];
    for(let i=0; i<7; i++) if(isValidMove(2, i)) validMoves.push(i);
    if(validMoves.length === 0) return;

    let bestMove = -1; let bestScore = -99;
    for(let i of validMoves) {
        let nextPos = state.p2_pos[i] + state.roll;
        let score = 0;
        if(nextPos === 14) score += 50; 
        else {
            if(nextPos >= 4 && nextPos <= 11 && state.p1_pos.includes(nextPos)) score += 30; 
            if(nextPos === 3 || nextPos === 7 || nextPos === 13) score += 20; 
            if(state.p2_pos[i] === -1) score += 10; 
            score += nextPos; 
        }
        if(score > bestScore) { bestScore = score; bestMove = i; }
    }
    if(bestMove !== -1) {
        state.selectedPiece = bestMove; state.subText = "AI IS MOVING..."; playSound('select');
        setTimeout(() => attemptMove(2, bestMove), 1500);
    }
}

function updateTargetCoords() {
    for(let i=0; i<7; i++) {
        if(state.p1_pos[i] === -1) { visualPieces.p1[i].tx = 60; visualPieces.p1[i].ty = 320 + i*28; }
        else if(state.p1_pos[i] >= 14) { visualPieces.p1[i].tx = 60; visualPieces.p1[i].ty = 850; } 
        else {
            let [c, r] = P1_PATH[state.p1_pos[i]];
            visualPieces.p1[i].tx = OFF_X + c*TILE + TILE/2; visualPieces.p1[i].ty = OFF_Y + r*TILE + TILE/2;
        }
        if(state.p2_pos[i] === -1) { visualPieces.p2[i].tx = 540; visualPieces.p2[i].ty = 320 + i*28; }
        else if(state.p2_pos[i] >= 14) { visualPieces.p2[i].tx = 540; visualPieces.p2[i].ty = 850; } 
        else {
            let [c, r] = P2_PATH[state.p2_pos[i]];
            visualPieces.p2[i].tx = OFF_X + c*TILE + TILE/2; visualPieces.p2[i].ty = OFF_Y + r*TILE + TILE/2;
        }
    }
}

function renderLoop() {
    ctx.clearRect(0,0,900,450);
    drawWoodBackground();
    drawBoardBase();

    for(let r=0; r<8; r++) {
        for(let c=0; c<3; c++) drawTile(c, r);
    }

    drawSelectedPath();
    drawUI();

    const drawPieceSet = (vArray, player) => {
        vArray.forEach((p, i) => {
            p.x += (p.tx - p.x) * 0.15; p.y += (p.ty - p.y) * 0.15;
            if(p.ty === 850 && Math.abs(p.y - p.ty) < 5) return; 

            ctx.save(); ctx.translate(p.x, p.y);
            
            // Drop shadow
            ctx.shadowBlur = 8; ctx.shadowColor = "rgba(0,0,0,0.8)";
            ctx.beginPath(); ctx.arc(0, 0, 26, 0, Math.PI*2);
            ctx.fillStyle = player === 1 ? "#0a1f3d" : "#4a2a16"; // Dark edge
            ctx.fill(); ctx.shadowBlur = 0;

            // Premium 3D Gradient
            let grad = ctx.createRadialGradient(-6, -6, 2, 0, 0, 26);
            if(player === 1) { // Deep Lapis Lazuli
                grad.addColorStop(0, "#3e82d1"); grad.addColorStop(1, "#0d294f");
            } else { // Carved Amber/Wood
                grad.addColorStop(0, "#d19a58"); grad.addColorStop(1, "#75451c");
            }
            ctx.beginPath(); ctx.arc(0, 0, 24, 0, Math.PI*2);
            ctx.fillStyle = grad; ctx.fill();

            // Inner lighting rim
            ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.lineWidth = 1.5; ctx.stroke();

            // Dots
            ctx.fillStyle = player === 1 ? "#e5b83b" : "#2d8fa8";
            let dots = [[0,0], [-10,-10], [10,10], [-10,10], [10,-10]];
            dots.forEach(pt => {
                ctx.beginPath(); ctx.arc(pt[0], pt[1], 3, 0, Math.PI*2); ctx.fill();
            });

            // Glowing effects
            let logicPos = player === 1 ? state.p1_pos[i] : state.p2_pos[i];
            if(state.hasRolled && state.roll > 0 && state.turn === player && state.selectedPiece === -1 && isValidMove(state.turn, i)) {
                ctx.beginPath(); ctx.arc(0, 0, 32 + Math.sin(performance.now()/200)*2, 0, Math.PI*2);
                ctx.strokeStyle = "rgba(255, 255, 255, 0.5)"; ctx.lineWidth = 2; ctx.stroke();
            }

            if(state.turn === player && state.selectedPiece === i) {
                ctx.beginPath(); ctx.arc(0, 0, 32, 0, Math.PI*2);
                ctx.strokeStyle = player === 1 ? "#00d2ff" : "#ff3e3e";
                ctx.lineWidth = 4; ctx.stroke();
            }
            ctx.restore();
        });
    };

    drawPieceSet(visualPieces.p1, 1);
    drawPieceSet(visualPieces.p2, 2);

    requestAnimationFrame(renderLoop);
}

updateTargetCoords();
renderLoop();
</script>
